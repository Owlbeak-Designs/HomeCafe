{% extends 'drinks/base.html' %}
{% load static %}

{% block head %}

{% endblock %}

{% block content %}
<h1>Place an Order</h1>

<form method="post">
    {% csrf_token %}

</form>

<p><a href="{% url 'drinks:order_list' %}">Back to home</a></p>
{% endblock %}
